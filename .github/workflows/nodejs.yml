name: Node CI

on:
  push:
    branches: [ master ]
  pull_request_target:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x]
        include:
        - os: macos-latest
          node-version: 24.x
        - os: macos-14
          node-version: 24.x
        # TODO : add Windows build
        # - os: windows-latest
        #   node-version: 24.x
          
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - name: Install Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'zulu'
        java-version: '11'
    - name: yarn install
      run: yarn install
    - name: yarn build
      run: yarn build
    - name: Linting
      run: yarn lint:ci
    - name: Testing
      run: yarn test:ci
      env:
        CI: true
    - uses: actions/upload-artifact@v6
      if: matrix.node-version == '24.x'
      with:
        name: reports-${{ matrix.os }}-${{ matrix.node-version }}
        retention-days: 1
        path: |
          **/coverage/lcov.info
          **/coverage/sonar-report.xml
          !node_modules/**

  # ─── Job 2: uploads coverage using secrets, does NOT run PR code ─────────
  static_analysis:
    name: "🔬 Static Analysis"
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      id-token: write
      contents: read
    steps:
    # Commit is needed to check coverage files against content
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
        # Disabling shallow clone is needed by SonarQube
        fetch-depth: 0
    - uses: actions/download-artifact@v8
      with:
        pattern: reports-*
        path: __reports
    - run: find . -name "lcov.info"
    - name: Collect Sonar report paths
      id: sonar_reports
      run: |
        paths=$(find . -name "sonar-report.xml" | tr '\n' ',' | sed 's/,$//')
        echo "paths=$paths" >> $GITHUB_OUTPUT
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.testExecutionReportPaths=${{ steps.sonar_reports.outputs.paths }}
